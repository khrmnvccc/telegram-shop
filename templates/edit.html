```html
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Mahsulotni tahrirlash</title>
</head>
<body>

<h1>✏️ Mahsulotni tahrirlash</h1>

<form action="/update/{{ product[0] }}" method="POST" enctype="multipart/form-data">

    <p>Mahsulot nomi</p>
    <input
        type="text"
        name="name"
        value="{{ product[1] }}"
        required
    >

    <p>Narxi</p>
    <input
        type="text"
        name="price"
        value="{{ product[2] }}"
        required
    >

    <p>Yangi rasm (ixtiyoriy)</p>
    <input
        type="file"
        name="image"
        accept="image/*"
    >

    <br><br>

    <button type="submit">
        💾 Saqlash
    </button>

</form>

</body>
</html>
