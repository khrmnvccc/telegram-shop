<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<link rel="stylesheet" href="/static/style.css">

</head>
<body>

<div class="login-page">

<div class="login-card" style="max-width:900px;">

<h1 style="text-align:center;margin-bottom:30px;">
🛠 Admin Panel
</h1>

<h2>➕ Mahsulot qo'shish</h2>

<form action="/add_product" method="POST" enctype="multipart/form-data">

<label>1-rasm (Asosiy)</label>
<input type="file" name="image" accept="image/*" required>

<label>2-rasm</label>
<input type="file" name="image2" accept="image/*">

<label>3-rasm</label>
<input type="file" name="image3" accept="image/*">

<label>4-rasm</label>
<input type="file" name="image4" accept="image/*">

<label>Mahsulot nomi</label>
<input type="text" name="name" required>

<label>Narxi</label>
<input type="text" name="price" required>

<label>Batafsil ma'lumot</label>

<textarea
name="description"
rows="6"
placeholder="Mahsulot haqida yozing..."
></textarea>

<button type="submit" class="buy-btn">
➕ Mahsulot qo'shish
</button>

</form>

<hr style="margin:40px 0;">

<h2>⚙️ Sayt sozlamalari</h2>

<form
action="/update_settings"
method="POST"
enctype="multipart/form-data"
>

<label>Sayt nomi</label>

<input
type="text"
name="site_name"
value="{{ settings[0] }}"
required
>

<label>Banner sarlavhasi</label>

<input
type="text"
name="banner_title"
value="{{ settings[1] }}"
required
>

<label>Banner matni</label>

<textarea
name="banner_text"
rows="4"
required>{{ settings[2] }}</textarea>

<label>Telefon</label>

<input
type="text"
name="phone"
value="{{ settings[3] }}"
required
>

<label>Manzil</label>

<input
type="text"
name="address"
value="{{ settings[4] }}"
required
>

<label>Ish vaqti</label>

<input
type="text"
name="work_time"
value="{{ settings[5] }}"
required
>

<label>Banner rasmi</label>

<input
type="file"
name="banner_image"
accept="image/*"
>

<label>Logo rasmi</label>

<input
type="file"
name="logo_image"
accept="image/*"
>

<button type="submit" class="buy-btn">
💾 Sozlamalarni saqlash
</button>

</form>

<br>

<a href="/">
<button class="detail-btn">
⬅ Bosh sahifaga qaytish
</button>
</a>

</div>

</div>

</body>
</html>
