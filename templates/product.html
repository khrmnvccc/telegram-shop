<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>{{ product[1] }}</title>

    <link rel="stylesheet" href="/static/style.css">

    <style>
        .card{
            max-width:600px;
            margin:40px auto;
            background:#fff;
            padding:20px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,.1);
        }

        #main-image{
            width:100%;
            height:400px;
            object-fit:cover;
            border-radius:10px;
        }

        .gallery{
            display:flex;
            gap:10px;
            margin-top:15px;
            flex-wrap:wrap;
        }

        .gallery img{
            width:80px;
            height:80px;
            object-fit:cover;
            border-radius:8px;
            cursor:pointer;
            border:2px solid #ddd;
        }

        h2{
            margin-top:20px;
        }

        .price{
            color:#27ae60;
            font-size:26px;
            font-weight:bold;
        }

        .desc{
            margin-top:20px;
            line-height:1.7;
            color:#555;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            margin-top:10px;
            font-size:17px;
        }

        .buy{
            background:#2ecc71;
            color:white;
        }

        .back{
            background:#ddd;
        }
    </style>

</head>
<body>

<div class="card">

    <img id="main-image" src="{{ product[3] }}">

    <div class="gallery">

        {% if product[3] %}
        <img src="{{ product[3] }}" onclick="changeImage(this.src)">
        {% endif %}

        {% if product[4] %}
        <img src="{{ product[4] }}" onclick="changeImage(this.src)">
        {% endif %}

        {% if product[5] %}
        <img src="{{ product[5] }}" onclick="changeImage(this.src)">
        {% endif %}

        {% if product[6] %}
        <img src="{{ product[6] }}" onclick="changeImage(this.src)">
        {% endif %}

    </div>

    <h2>{{ product[1] }}</h2>

    <p class="price">{{ product[2] }} so'm</p>

    <hr>

    <h3>📄 Batafsil</h3>

    <div class="desc">
        {{ product[7] }}
    </div>

    <a href="/add/{{ product[0] }}">
        <button class="buy">🛒 Savatga qo'shish</button>
    </a>

    <a href="/">
        <button class="back">⬅ Orqaga</button>
    </a>

</div>

<script>
function changeImage(src){
    document.getElementById("main-image").src = src;
}
</script>

</body>
</html>
