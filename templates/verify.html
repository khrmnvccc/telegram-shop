<!DOCTYPE html>
<html lang="uz">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tasdiqlash</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="login-page">

<div class="login-card">

<div class="login-top">

<div class="login-icon">

🔐

</div>

<h1>Tasdiqlash</h1>

<p>

Telegram botga yuborilgan
6 xonali kodni kiriting

</p>

</div>

<form action="/verify" method="POST">

<div class="input-group">

<label>

🔑 Tasdiqlash kodi

</label>

<input

type="text"

name="code"

placeholder="123456"

maxlength="6"

autocomplete="one-time-code"

required

>

</div>

<button

type="submit"

class="buy-btn">

✅ Tasdiqlash

</button>

</form>

{% if error %}

<div class="error-box">

{{ error }}

</div>

{% endif %}

<div class="login-divider">

<span>Kod kelmadimi?</span>

</div>

<div class="login-bottom">

<p>

Telegram botni tekshiring va eng oxirgi yuborilgan kodni kiriting.

</p>

</div>

</div>

</div>

<script>

const inputs=document.querySelectorAll(".otp-input");

const hidden=document.getElementById("full-code");

inputs.forEach((input,index)=>{

input.addEventListener("input",()=>{

input.value=input.value.replace(/\D/g,'');

if(input.value && index<5){

inputs[index+1].focus();

}

hidden.value=[...inputs].map(i=>i.value).join("");

});

input.addEventListener("keydown",(e)=>{

if(e.key==="Backspace" && !input.value && index>0){

inputs[index-1].focus();

}

});

});

</script>

</body>

</html>
