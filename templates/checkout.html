<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Buyurtma</title>
</head>
<body>

<h1>📦 Buyurtma berish</h1>

<form action="/finish_order" method="POST">

    <p>Ismingiz</p>
    <input
        type="text"
        name="name"
        placeholder="Ismingizni kiriting"
        required
    >

    <p>Telefon raqamingiz</p>
    <input
        type="tel"
        name="phone"
        placeholder="+998 90 123 45 67"
        required
    >

    <p>Manzilingiz</p>
    <textarea
        name="address"
        placeholder="Manzilingizni kiriting..."
        rows="4"
        required
    ></textarea>

    <br><br>

    <button type="submit">
        🛒 Buyurtma berish
    </button>

</form>

</body>
</html>
